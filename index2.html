<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tombol Lucu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
    }

    .btn{
      padding:20px 40px;
      font-size:25px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      background:#ff4fd8;
      color:white;
      transition:0.3s;
      box-shadow:
        0 0 10px #ff4fd8,
        0 0 20px #ff4fd8,
        0 0 40px #ff4fd8;
    }

    .btn:hover{
      transform:scale(1.1);
      box-shadow:
        0 0 20px #ff8ae8,
        0 0 40px #ff8ae8,
        0 0 80px #ff8ae8;
    }
  </style>
</head>
<body>

  <!-- Ganti pinkglow.html dengan nama file web pertama -->
  <button class="btn" onclick="window.location.href='index.html'">
    tolong diklik yaa😊
  </button>

</body>
</html>
